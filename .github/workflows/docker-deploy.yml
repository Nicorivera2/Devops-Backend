name: Build and Push Docker Images
#test
on:
  push:
    branches:
      - deploy

jobs:
  build-ms-venta:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: "temurin"

      - name: Build ms-venta
        working-directory: ./back-Ventas_SpringBoot/Springboot-API-REST
        run: mvn clean package -DskipTests

      - name: Login Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build Docker image
        working-directory: ./back-Ventas_SpringBoot/Springboot-API-REST
        run: |
          docker build -t ${{ secrets.DOCKER_USERNAME }}/ms-venta:latest .

      - name: Push Docker image
        run: |
          docker push ${{ secrets.DOCKER_USERNAME }}/ms-venta:latest

  build-ms-despacho:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: "temurin"

      - name: Build ms-despacho
        working-directory: ./back-Despachos_SpringBoot/Springboot-API-REST-DESPACHO
        run: mvn clean package -DskipTests

      - name: Login Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build Docker image
        working-directory: ./back-Despachos_SpringBoot/Springboot-API-REST-DESPACHO
        run: |
          docker build -t ${{ secrets.DOCKER_USERNAME }}/ms-despacho:latest .

      - name: Push Docker image
        run: |
          docker push ${{ secrets.DOCKER_USERNAME }}/ms-despacho:latest
